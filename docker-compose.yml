services:
  gt-vpn-webapp:
    build: .
    container_name: gt-vpn-webapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:GuardTunnel_DB_2026!@db:5432/guardtunnel?schema=public
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: GuardTunnel_S3_2026!
      MINIO_BUCKET: guardtunnel
      MINIO_USE_SSL: "false"
      NEXT_PUBLIC_MINIO_URL: https://s3.gt-vpn.ru
      NEXT_PUBLIC_SITE_URL: https://gt-vpn.ru
      ADMIN_SECRET_URL: gt-secure-panel-x7k9
      JWT_SECRET: GuardTunnel_JWT_SuperSecret_2026!
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: gt-vpn-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: GuardTunnel_DB_2026!
      POSTGRES_DB: guardtunnel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d guardtunnel"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gt-vpn-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: GuardTunnel_S3_2026!
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio_data: